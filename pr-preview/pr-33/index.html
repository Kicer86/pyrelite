<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>
    <title>Pyrelite</title>
    <style>
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100%; }
      body {
        background: radial-gradient(circle at 50% 34%, #2a1830 0%, #150d1a 58%, #0b0810 100%);
      }
      #screen { width: 100%; height: 100%; }

      #qtspinner {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 30px;
        font-family: 'Segoe UI', system-ui, sans-serif; color: #e9d9c8;
      }
      #qtspinner img {
        width: 190px; height: auto;
        filter: drop-shadow(0 10px 28px rgba(255, 90, 30, .28));
      }
      .loadbar {
        position: relative; width: 220px; height: 6px;
        border-radius: 99px; background: rgba(255, 255, 255, .08); overflow: hidden;
      }
      .loadbar::after {
        content: ''; position: absolute; top: 0; left: -40%;
        height: 100%; width: 40%; border-radius: inherit;
        background: linear-gradient(90deg, #ffd33d, #ff7a1a, #ff3b1d);
        animation: slide 1.15s cubic-bezier(.45, 0, .25, 1) infinite;
      }
      @keyframes slide {
        0%   { left: -40%; }
        50%  { left: 32%; }
        100% { left: 100%; }
      }
      #qtstatus {
        font-size: 12px; letter-spacing: .22em; text-transform: uppercase;
        color: #b89a86;
      }
      noscript { color: #e9d9c8; }
    </style>
  </head>
  <body onload="init()">
    <div id="qtspinner">
      <img src="pyrelite-logo.svg" alt="Pyrelite">
      <div class="loadbar"></div>
      <div id="qtstatus">Loading…</div>
      <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
    </div>
    <div id="screen"></div>

    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = (ui === spinner) ? 'flex' : 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading…';

                await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData =>
                        {
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.pyrelite_entry,
                        containerElements: [screen],
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="pyrelite.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>
