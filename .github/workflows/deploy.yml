
name: Deploy to Pages

on:
  push:
    branches: [master]

permissions:
  contents: write

# Serialize every write to gh-pages (deploy + previews share this group) so
# GitHub Pages never runs overlapping builds, which fail.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web
        uses: ./.github/actions/build-web

      - name: Deploy to gh-pages (site root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
