
name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

# Shared with deploy.yml: serialize gh-pages writes (see deploy.yml).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      # Check out the PR's head commit, not the default merge ref. The merge
      # ref's SHA exists on no branch, so the in-app version stamp would show a
      # commit you can't find in the repo. The head SHA matches the PR's latest
      # commit. On 'closed' the branch may be gone, so fall back to the default.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.action != 'closed' && github.event.pull_request.head.sha || '' }}
          submodules: recursive

      - name: Build web
        if: github.event.action != 'closed'
        uses: ./.github/actions/build-web

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./public
