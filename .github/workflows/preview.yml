
name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

# Shared with deploy.yml: serialize gh-pages writes (see deploy.yml).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build web
        if: github.event.action != 'closed'
        uses: ./.github/actions/build-web

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./public
